<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Email Template Preview — T-Nexus</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; }
    .tabs { display: flex; gap: 8px; padding: 20px 20px 0; justify-content: center; }
    .tab { padding: 10px 24px; border-radius: 8px 8px 0 0; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: #2a2a4a; color: #9ca3af; transition: all 0.2s; }
    .tab.active { background: #f4f6f9; color: #1a1f2e; }
    .tab:hover:not(.active) { background: #3a3a5a; color: #fff; }
    .preview { max-width: 700px; margin: 0 auto; padding: 0 20px 40px; }
    .preview iframe { width: 100%; border: none; border-radius: 0 0 12px 12px; background: #f4f6f9; }
    h2 { color: #fff; text-align: center; margin: 20px 0 8px; font-size: 16px; }
    p.desc { color: #9ca3af; text-align: center; margin: 0 0 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" onclick="show('signup')">Xác thực đăng ký</button>
    <button class="tab" onclick="show('reset')">Quên mật khẩu</button>
    <button class="tab" onclick="show('digest')">Daily Digest</button>
  </div>
  <div class="preview">
    <h2 id="title">Email xác thực đăng ký</h2>
    <p class="desc" id="desc">Preview mẫu email OTP khi đăng ký tài khoản</p>
    <iframe id="frame" height="900"></iframe>
  </div>

  <script>
    const BRAND = {
      primary: "#2b4acb", primaryDk: "#1e3a9f",
      teal: "#006b6b", tealLight: "#008f8f", tealSoft: "#e6f5f5",
      bg: "#f4f6f9", card: "#ffffff",
      text: "#1a1f2e", textSoft: "#37415b", muted: "#6b7280", subtle: "#9ca3af",
      border: "#e5e7eb", borderSoft: "#f0f1f3",
      danger: "#dc2626", dangerBg: "#fef2f2", dangerBorder: "#fecaca",
      warningBg: "#fffbeb", warningBorder: "#fde68a", warningText: "#92400e",
      successBg: "#f0fdf4", successBorder: "#bbf7d0", successText: "#166534",
    };
    const LOGO_URL = "https://t-nexus.io.vn/lovable-uploads/f2f37fb6-e870-4731-8f1b-75fc2da9d498.png";
    const SITE_URL = "https://t-nexus.io.vn";
    const year = new Date().getFullYear();

    function emailHeader(subtitle) {
      return `<tr><td style="background:linear-gradient(135deg, ${BRAND.teal} 0%, ${BRAND.tealLight} 40%, ${BRAND.primary} 100%);padding:36px 40px 30px;text-align:center;">
        <table cellpadding="0" cellspacing="0" role="presentation" style="margin:0 auto;"><tr>
          <td style="padding-right:14px;vertical-align:middle;"><img src="${LOGO_URL}" alt="T-Nexus" width="40" height="40" style="display:block;border:0;border-radius:10px;" /></td>
          <td style="vertical-align:middle;"><span style="color:#ffffff;font-size:26px;font-weight:800;letter-spacing:-0.5px;">T-Nexus</span></td>
        </tr></table>
        <p style="margin:10px 0 0;color:rgba(255,255,255,0.7);font-size:13px;font-weight:400;letter-spacing:0.3px;">${subtitle}</p>
      </td></tr>`;
    }

    function emailFooter() {
      return `<tr><td style="padding:0;"><div style="height:3px;background:linear-gradient(90deg, ${BRAND.teal}, ${BRAND.tealLight}, ${BRAND.primary});"></div></td></tr>
      <tr><td style="padding:24px 40px 20px;background-color:#fafbfc;">
        <table width="100%" cellpadding="0" cellspacing="0" role="presentation"><tr><td style="text-align:center;">
          <table cellpadding="0" cellspacing="0" role="presentation" style="margin:0 auto 12px;"><tr>
            <td style="padding-right:8px;vertical-align:middle;"><img src="${LOGO_URL}" alt="" width="20" height="20" style="display:block;border:0;border-radius:5px;opacity:0.7;" /></td>
            <td style="vertical-align:middle;"><span style="color:${BRAND.muted};font-size:13px;font-weight:700;letter-spacing:-0.3px;">T-Nexus</span></td>
          </tr></table>
          <p style="margin:0 0 4px;color:${BRAND.subtle};font-size:11px;line-height:1.6;">The night shift for your teamwork</p>
          <p style="margin:0 0 12px;color:${BRAND.subtle};font-size:10px;">&copy; ${year} T-Nexus. All rights reserved.</p>
          <a href="${SITE_URL}" style="display:inline-block;color:${BRAND.teal};font-size:11px;font-weight:500;text-decoration:none;border:1px solid ${BRAND.border};border-radius:6px;padding:5px 14px;">t-nexus.io.vn</a>
        </td></tr></table>
      </td></tr>`;
    }

    function buildOtp(title, subtitle, otpCode, expiryText, warningText, ignoreText, icon) {
      const digits = otpCode.split("").map(d =>
        `<td style="padding:0 3px;"><div style="width:48px;height:60px;background-color:${BRAND.card};border:2px solid ${BRAND.border};border-radius:12px;line-height:60px;text-align:center;font-size:28px;font-weight:800;color:${BRAND.teal};font-family:'Courier New',monospace;box-shadow:0 2px 8px rgba(0,0,0,0.06);">${d}</div></td>`
      ).join("");

      return `<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${title}</title></head>
<body style="margin:0;padding:0;background-color:${BRAND.bg};font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:${BRAND.bg};padding:32px 16px;"><tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background-color:${BRAND.card};border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);">
${emailHeader(subtitle)}
<tr><td style="padding:36px 40px 12px;">
  <div style="text-align:center;margin-bottom:20px;"><div style="display:inline-block;width:56px;height:56px;line-height:56px;text-align:center;background:linear-gradient(135deg, ${BRAND.tealSoft} 0%, #e8edf5 100%);border-radius:16px;font-size:28px;">${icon}</div></div>
  <h1 style="margin:0 0 8px;color:${BRAND.text};font-size:22px;font-weight:800;line-height:1.3;text-align:center;letter-spacing:-0.3px;">${title}</h1>
  <p style="margin:0 0 28px;color:${BRAND.muted};font-size:14px;line-height:1.6;text-align:center;">${expiryText}</p>
  <table cellpadding="0" cellspacing="0" style="margin:0 auto 8px;"><tr>${digits}</tr></table>
  <p style="margin:0 0 28px;color:${BRAND.subtle};font-size:11px;text-align:center;letter-spacing:0.2px;">Nhập mã trên vào ứng dụng để tiếp tục</p>
  <div style="height:1px;background:linear-gradient(to right, transparent, ${BRAND.border}, transparent);margin-bottom:20px;"></div>
  <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;"><tr>
    <td style="background-color:${BRAND.warningBg};border:1px solid ${BRAND.warningBorder};border-left:4px solid #f59e0b;border-radius:12px;padding:14px 18px;">
      <table cellpadding="0" cellspacing="0"><tr>
        <td style="vertical-align:top;padding-right:10px;width:24px;"><div style="width:24px;height:24px;line-height:24px;text-align:center;background-color:#fef3c7;border-radius:6px;font-size:13px;">🔒</div></td>
        <td><p style="margin:0;color:${BRAND.warningText};font-size:12px;line-height:1.6;font-weight:500;">${warningText}</p></td>
      </tr></table>
    </td>
  </tr></table>
  <p style="margin:0 0 8px;color:${BRAND.subtle};font-size:12px;text-align:center;line-height:1.5;">${ignoreText}</p>
</td></tr>
${emailFooter()}
</table>
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;margin-top:16px;"><tr><td style="text-align:center;padding:0 20px;">
  <p style="margin:0;color:${BRAND.subtle};font-size:10px;line-height:1.6;">Email này được gửi tự động từ hệ thống T-Nexus.<br/>Vui lòng không trả lời email này.</p>
</td></tr></table>
</td></tr></table></body></html>`;
    }

    function buildDigest() {
      const tasks = `
      <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
        <tr><td><table cellpadding="0" cellspacing="0" style="margin-bottom:12px;"><tr>
          <td style="vertical-align:middle;padding-right:8px;"><div style="width:28px;height:28px;line-height:28px;text-align:center;background-color:${BRAND.dangerBg};border-radius:8px;font-size:14px;">⏰</div></td>
          <td style="vertical-align:middle;"><span style="color:${BRAND.danger};font-size:15px;font-weight:700;">Deadline sắp hết</span><span style="color:${BRAND.muted};font-size:13px;margin-left:6px;">(2 task)</span></td>
        </tr></table></td></tr>
        <tr><td style="background-color:${BRAND.card};border:1px solid ${BRAND.dangerBorder};border-left:4px solid ${BRAND.danger};border-radius:12px;overflow:hidden;">
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr><td style="padding:10px 16px;border-bottom:1px solid ${BRAND.borderSoft};"><table width="100%" cellpadding="0" cellspacing="0"><tr>
              <td style="vertical-align:top;width:28px;padding-right:10px;"><div style="width:28px;height:28px;line-height:28px;text-align:center;background-color:${BRAND.dangerBg};border-radius:8px;font-size:13px;">🔴</div></td>
              <td><p style="margin:0 0 2px;color:${BRAND.text};font-size:14px;font-weight:600;">Hoàn thành báo cáo cuối kỳ</p><p style="margin:0;color:${BRAND.muted};font-size:12px;">📁 Đồ án CNPM · còn 4h</p></td>
            </tr></table></td></tr>
            <tr><td style="padding:10px 16px;"><table width="100%" cellpadding="0" cellspacing="0"><tr>
              <td style="vertical-align:top;width:28px;padding-right:10px;"><div style="width:28px;height:28px;line-height:28px;text-align:center;background-color:${BRAND.dangerBg};border-radius:8px;font-size:13px;">🟡</div></td>
              <td><p style="margin:0 0 2px;color:${BRAND.text};font-size:14px;font-weight:600;">Review slide thuyết trình</p><p style="margin:0;color:${BRAND.muted};font-size:12px;">📁 Nhập môn AI · còn 18h</p></td>
            </tr></table></td></tr>
          </table>
        </td></tr>
      </table>

      <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
        <tr><td><table cellpadding="0" cellspacing="0" style="margin-bottom:12px;"><tr>
          <td style="vertical-align:middle;padding-right:8px;"><div style="width:28px;height:28px;line-height:28px;text-align:center;background-color:${BRAND.tealSoft};border-radius:8px;font-size:14px;">📋</div></td>
          <td style="vertical-align:middle;"><span style="color:${BRAND.teal};font-size:15px;font-weight:700;">Task mới được giao</span><span style="color:${BRAND.muted};font-size:13px;margin-left:6px;">(1 task)</span></td>
        </tr></table></td></tr>
        <tr><td style="background-color:${BRAND.card};border:1px solid ${BRAND.successBorder};border-left:4px solid ${BRAND.teal};border-radius:12px;overflow:hidden;">
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr><td style="padding:10px 16px;"><table width="100%" cellpadding="0" cellspacing="0"><tr>
              <td style="vertical-align:top;width:28px;padding-right:10px;"><div style="width:28px;height:28px;line-height:28px;text-align:center;background-color:${BRAND.tealSoft};border-radius:8px;font-size:13px;">📋</div></td>
              <td><p style="margin:0 0 2px;color:${BRAND.text};font-size:14px;font-weight:600;">Thiết kế wireframe trang chủ</p><p style="margin:0;color:${BRAND.muted};font-size:12px;">📁 Đồ án CNPM · ⏰ 15/04/2026</p></td>
            </tr></table></td></tr>
          </table>
        </td></tr>
      </table>`;

      return `<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Daily Digest</title></head>
<body style="margin:0;padding:0;background-color:${BRAND.bg};font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:${BRAND.bg};padding:32px 16px;"><tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:${BRAND.card};border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);">
${emailHeader("Cập nhật hàng ngày từ dự án của bạn")}
<tr><td style="padding:32px 40px 16px;">
  <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;"><tr><td>
    <div style="display:inline-block;width:48px;height:48px;line-height:48px;text-align:center;background:linear-gradient(135deg, ${BRAND.tealSoft} 0%, #e8edf5 100%);border-radius:14px;font-size:24px;margin-bottom:14px;">📊</div>
    <h1 style="margin:0 0 6px;color:${BRAND.text};font-size:20px;font-weight:800;letter-spacing:-0.3px;">Xin chào Nguyễn Văn A,</h1>
    <p style="margin:0;color:${BRAND.muted};font-size:14px;line-height:1.5;">Đây là tóm tắt hoạt động dự án hôm nay của bạn.</p>
  </td></tr></table>
  <div style="height:1px;background:linear-gradient(to right, transparent, ${BRAND.border}, transparent);margin-bottom:24px;"></div>
  ${tasks}
  <table width="100%" cellpadding="0" cellspacing="0"><tr>
    <td style="background-color:#f8fafc;border:1px solid ${BRAND.border};border-radius:12px;padding:14px 18px;text-align:center;">
      <p style="margin:0;color:${BRAND.muted};font-size:13px;line-height:1.5;">Truy cập hệ thống để xem chi tiết và cập nhật tiến độ.</p>
    </td>
  </tr></table>
</td></tr>
${emailFooter()}
</table>
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;margin-top:16px;"><tr><td style="text-align:center;padding:0 20px;">
  <p style="margin:0;color:${BRAND.subtle};font-size:10px;line-height:1.6;">Email tự động từ T-Nexus · Bạn có thể tắt trong phần Thông tin cá nhân.</p>
</td></tr></table>
</td></tr></table></body></html>`;
    }

    const templates = {
      signup: () => buildOtp(
        "Xác minh tài khoản",
        "Hệ thống quản lý dự án nhóm",
        "847291",
        'Sử dụng mã bên dưới để xác minh email của bạn. Mã có hiệu lực trong <strong>5 phút</strong>.',
        '<strong>Không chia sẻ mã này cho bất kỳ ai.</strong> T-Nexus sẽ không bao giờ yêu cầu bạn cung cấp mã OTP qua tin nhắn hay điện thoại.',
        'Nếu bạn không yêu cầu tạo tài khoản, vui lòng bỏ qua email này.',
        '✉️'
      ),
      reset: () => buildOtp(
        "Đặt lại mật khẩu",
        "Yêu cầu khôi phục tài khoản",
        "503167",
        'Mã xác minh bên dưới có hiệu lực trong <strong>10 phút</strong>.',
        '<strong>Không chia sẻ mã này cho bất kỳ ai.</strong> T-Nexus sẽ không bao giờ yêu cầu bạn cung cấp mã OTP qua tin nhắn hay điện thoại.',
        'Nếu bạn không yêu cầu đặt lại mật khẩu, vui lòng bỏ qua email này.',
        '🔑'
      ),
      digest: buildDigest,
    };

    const info = {
      signup: { title: 'Email xác thực đăng ký', desc: 'Preview mẫu email OTP khi đăng ký tài khoản' },
      reset:  { title: 'Email quên mật khẩu', desc: 'Preview mẫu email OTP khi yêu cầu đặt lại mật khẩu' },
      digest: { title: 'Email tóm tắt hàng ngày', desc: 'Preview mẫu email digest với deadline + task mới' },
    };

    function show(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('title').textContent = info[type].title;
      document.getElementById('desc').textContent = info[type].desc;
      const frame = document.getElementById('frame');
      frame.srcdoc = templates[type]();
    }

    // Init
    document.getElementById('frame').srcdoc = templates.signup();
  </script>
</body>
</html>

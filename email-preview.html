<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Email Template Preview — T-Nexus</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
    .tabs { display: flex; gap: 8px; padding: 24px 24px 0; }
    .tab { padding: 8px 20px; border-radius: 6px 6px 0 0; border: 1px solid #e5e7eb; border-bottom: none; cursor: pointer; font-size: 13px; font-weight: 500; background: #ffffff; color: #6b7280; transition: all 0.15s; }
    .tab.active { background: #ffffff; color: #111827; font-weight: 600; border-bottom: 2px solid #ffffff; }
    .tab:hover:not(.active) { color: #374151; background: #f9fafb; }
    .preview { max-width: 680px; margin: 0 auto; padding: 0 24px 48px; }
    .preview iframe { width: 100%; border: none; border-radius: 0 8px 8px 8px; background: #ffffff; }
    h2 { color: #111827; margin: 0 0 4px; font-size: 15px; font-weight: 600; }
    p.desc { color: #6b7280; margin: 0 0 0; font-size: 12px; }
    .meta { max-width: 680px; margin: 0 auto; padding: 16px 24px 12px; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" onclick="show('signup')">OTP Đăng ký</button>
    <button class="tab" onclick="show('reset')">OTP Đặt lại mật khẩu</button>
    <button class="tab" onclick="show('digest')">Daily Digest</button>
  </div>
  <div class="meta">
    <h2 id="title">Email xác thực đăng ký</h2>
    <p class="desc" id="desc">Mã OTP gửi khi người dùng đăng ký tài khoản mới</p>
  </div>
  <div class="preview">
    <iframe id="frame" height="680"></iframe>
  </div>

  <script>
    const C = {
      accent:       "#2563eb",
      accentLight:  "#eff6ff",
      accentBorder: "#bfdbfe",
      text:         "#111827",
      muted:        "#6b7280",
      subtle:       "#9ca3af",
      border:       "#e5e7eb",
      borderLight:  "#f3f4f6",
      bg:           "#ffffff",
      bgLight:      "#f9fafb",
      warning:      "#92400e",
      warningBg:    "#fffbeb",
      warningBdr:   "#fcd34d",
      danger:       "#b91c1c",
      dangerBdr:    "#fca5a5",
    };

    const SITE_URL = "https://t-nexus.io.vn";
    const year = new Date().getFullYear();

    function emailHeader(subtitle) {
      return `
  <tr>
    <td style="padding:32px 40px 24px;border-bottom:1px solid ${C.border};">
      <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td style="vertical-align:middle;">
            <span style="font-size:18px;font-weight:700;color:${C.text};font-family:'Segoe UI',Arial,sans-serif;letter-spacing:-0.3px;">T-Nexus</span>
          </td>
          <td style="text-align:right;vertical-align:middle;">
            <span style="font-size:12px;color:${C.muted};font-family:'Segoe UI',Arial,sans-serif;">${subtitle}</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>`;
    }

    function emailFooter() {
      return `
  <tr>
    <td style="padding:24px 40px;border-top:1px solid ${C.border};text-align:center;">
      <p style="margin:0 0 8px;color:${C.subtle};font-size:11px;font-family:'Segoe UI',Arial,sans-serif;line-height:1.6;">
        &copy; ${year} T-Nexus. All rights reserved.
      </p>
      <a href="${SITE_URL}" style="color:${C.accent};font-size:11px;text-decoration:none;font-family:'Segoe UI',Arial,sans-serif;">
        t-nexus.io.vn
      </a>
    </td>
  </tr>`;
    }

    function buildOtp(title, subtitle, otpCode, expiryText, warningText, ignoreText) {
      const digitBoxes = otpCode.split("").map(d =>
        `<td style="padding:0 4px;">
          <div style="width:46px;height:58px;background-color:${C.accentLight};border:1.5px solid ${C.accentBorder};border-radius:8px;line-height:58px;text-align:center;font-size:26px;font-weight:700;color:${C.accent};font-family:'Courier New',monospace;">${d}</div>
        </td>`
      ).join("");

      return `<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${title}</title></head>
<body style="margin:0;padding:0;background-color:${C.bg};font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:${C.bg};padding:32px 16px;"><tr><td align="center">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:540px;background-color:${C.bg};border:1px solid ${C.border};border-radius:12px;overflow:hidden;">
      ${emailHeader(subtitle)}
      <tr>
        <td style="padding:36px 40px 28px;">
          <h1 style="margin:0 0 8px;color:${C.text};font-size:20px;font-weight:700;line-height:1.3;font-family:'Segoe UI',Arial,sans-serif;">${title}</h1>
          <p style="margin:0 0 28px;color:${C.muted};font-size:14px;line-height:1.6;font-family:'Segoe UI',Arial,sans-serif;">${expiryText}</p>
          <table cellpadding="0" cellspacing="0" style="margin:0 0 8px;"><tr>${digitBoxes}</tr></table>
          <p style="margin:0 0 28px;color:${C.subtle};font-size:11px;font-family:'Segoe UI',Arial,sans-serif;">Nhập mã trên vào ứng dụng để tiếp tục</p>
          <div style="height:1px;background-color:${C.border};margin-bottom:20px;"></div>
          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;">
            <tr>
              <td style="background-color:${C.warningBg};border:1px solid ${C.warningBdr};border-radius:8px;padding:12px 16px;">
                <p style="margin:0;color:${C.warning};font-size:12px;line-height:1.6;font-family:'Segoe UI',Arial,sans-serif;">${warningText}</p>
              </td>
            </tr>
          </table>
          <p style="margin:0;color:${C.subtle};font-size:12px;line-height:1.5;font-family:'Segoe UI',Arial,sans-serif;">${ignoreText}</p>
        </td>
      </tr>
      ${emailFooter()}
    </table>
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:540px;margin-top:12px;"><tr><td style="text-align:center;padding:0 20px;">
      <p style="margin:0;color:${C.subtle};font-size:10px;line-height:1.7;font-family:'Segoe UI',Arial,sans-serif;">Email này được gửi tự động từ hệ thống T-Nexus.<br/>Vui lòng không trả lời email này.</p>
    </td></tr></table>
  </td></tr></table>
</body></html>`;
    }

    function buildDigest() {
      const deadlineTasks = [
        { title: "Hoàn thành báo cáo cuối kỳ", project: "Đồ án CNPM", hoursLeft: 4 },
        { title: "Review slide thuyết trình", project: "Nhập môn AI", hoursLeft: 18 },
      ];
      const newTasks = [
        { title: "Thiết kế wireframe trang chủ", project: "Đồ án CNPM", deadlineDisplay: "15/04/2026" },
      ];

      let deadlineRows = "";
      for (const t of deadlineTasks) {
        const urgencyColor = t.hoursLeft <= 6 ? C.danger : t.hoursLeft <= 12 ? "#d97706" : "#b45309";
        deadlineRows += `
          <tr>
            <td style="padding:12px 16px;border-bottom:1px solid ${C.borderLight};">
              <p style="margin:0 0 2px;color:${C.text};font-size:14px;font-weight:600;line-height:1.4;font-family:'Segoe UI',Arial,sans-serif;">${t.title}</p>
              <p style="margin:0;color:${C.muted};font-size:12px;line-height:1.4;font-family:'Segoe UI',Arial,sans-serif;">
                ${t.project} &mdash; <span style="color:${urgencyColor};font-weight:600;">còn ${t.hoursLeft}h</span>
              </p>
            </td>
          </tr>`;
      }

      let newRows = "";
      for (const t of newTasks) {
        newRows += `
          <tr>
            <td style="padding:12px 16px;border-bottom:1px solid ${C.borderLight};">
              <p style="margin:0 0 2px;color:${C.text};font-size:14px;font-weight:600;line-height:1.4;font-family:'Segoe UI',Arial,sans-serif;">${t.title}</p>
              <p style="margin:0;color:${C.muted};font-size:12px;line-height:1.4;font-family:'Segoe UI',Arial,sans-serif;">
                ${t.project} &mdash; ${t.deadlineDisplay}
              </p>
            </td>
          </tr>`;
      }

      return `<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cập nhật hàng ngày - T-Nexus</title></head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#ffffff;padding:32px 16px;"><tr><td align="center">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#ffffff;border:1px solid ${C.border};border-radius:12px;overflow:hidden;">
      ${emailHeader("Cập nhật dự án hàng ngày")}
      <tr>
        <td style="padding:32px 40px 24px;">
          <h1 style="margin:0 0 6px;color:${C.text};font-size:18px;font-weight:700;line-height:1.3;font-family:'Segoe UI',Arial,sans-serif;">Xin chào Nguyễn Văn A,</h1>
          <p style="margin:0 0 24px;color:${C.muted};font-size:14px;line-height:1.5;font-family:'Segoe UI',Arial,sans-serif;">Đây là tóm tắt hoạt động dự án hôm nay của bạn.</p>
          <div style="height:1px;background-color:${C.border};margin-bottom:24px;"></div>

          <!-- Deadline -->
          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
            <tr><td style="padding-bottom:10px;">
              <span style="font-size:13px;font-weight:600;color:${C.danger};font-family:'Segoe UI',Arial,sans-serif;">Deadline sắp hết</span>
              <span style="font-size:12px;color:${C.muted};margin-left:6px;font-family:'Segoe UI',Arial,sans-serif;">(2 task)</span>
            </td></tr>
            <tr><td style="border:1px solid ${C.dangerBdr};border-left:3px solid ${C.danger};border-radius:8px;overflow:hidden;">
              <table width="100%" cellpadding="0" cellspacing="0">${deadlineRows}</table>
            </td></tr>
          </table>

          <!-- New tasks -->
          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
            <tr><td style="padding-bottom:10px;">
              <span style="font-size:13px;font-weight:600;color:${C.accent};font-family:'Segoe UI',Arial,sans-serif;">Task mới được giao</span>
              <span style="font-size:12px;color:${C.muted};margin-left:6px;font-family:'Segoe UI',Arial,sans-serif;">(1 task)</span>
            </td></tr>
            <tr><td style="border:1px solid ${C.accentBorder};border-left:3px solid ${C.accent};border-radius:8px;overflow:hidden;">
              <table width="100%" cellpadding="0" cellspacing="0">${newRows}</table>
            </td></tr>
          </table>

          <!-- Summary -->
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr><td style="background-color:${C.bgLight};border:1px solid ${C.border};border-radius:8px;padding:12px 16px;text-align:center;">
              <p style="margin:0;color:${C.muted};font-size:13px;line-height:1.5;font-family:'Segoe UI',Arial,sans-serif;">
                Truy cập <a href="${SITE_URL}" style="color:${C.accent};text-decoration:none;font-weight:600;">t-nexus.io.vn</a> để xem chi tiết và cập nhật tiến độ.
              </p>
            </td></tr>
          </table>
        </td>
      </tr>
      ${emailFooter()}
    </table>
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;margin-top:12px;"><tr><td style="text-align:center;padding:0 20px;">
      <p style="margin:0;color:${C.subtle};font-size:10px;line-height:1.7;font-family:'Segoe UI',Arial,sans-serif;">Email tự động từ T-Nexus &middot; Bạn có thể tắt trong phần Thông tin cá nhân.</p>
    </td></tr></table>
  </td></tr></table>
</body></html>`;
    }

    const templates = {
      signup: () => buildOtp(
        "Xác minh tài khoản",
        "Hệ thống quản lý dự án nhóm",
        "847291",
        'Sử dụng mã bên dưới để xác minh email của bạn. Mã có hiệu lực trong <strong>5 phút</strong>.',
        '<strong>Không chia sẻ mã này cho bất kỳ ai.</strong> T-Nexus sẽ không bao giờ yêu cầu bạn cung cấp mã OTP qua tin nhắn hay điện thoại.',
        'Nếu bạn không yêu cầu tạo tài khoản, vui lòng bỏ qua email này.'
      ),
      reset: () => buildOtp(
        "Đặt lại mật khẩu",
        "Yêu cầu khôi phục tài khoản",
        "503167",
        'Mã xác minh bên dưới có hiệu lực trong <strong>10 phút</strong>.',
        '<strong>Không chia sẻ mã này cho bất kỳ ai.</strong> T-Nexus sẽ không bao giờ yêu cầu bạn cung cấp mã OTP qua tin nhắn hay điện thoại.',
        'Nếu bạn không yêu cầu đặt lại mật khẩu, vui lòng bỏ qua email này.'
      ),
      digest: buildDigest,
    };

    const info = {
      signup: { title: 'OTP Xác thực đăng ký', desc: 'Mã OTP gửi khi người dùng đăng ký tài khoản mới' },
      reset:  { title: 'OTP Đặt lại mật khẩu', desc: 'Mã OTP gửi khi người dùng yêu cầu đặt lại mật khẩu' },
      digest: { title: 'Daily Digest — Tóm tắt hàng ngày', desc: 'Email tự động hàng ngày với deadline sắp hết và task mới' },
    };

    function show(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('title').textContent = info[type].title;
      document.getElementById('desc').textContent = info[type].desc;
      const h = type === 'digest' ? 780 : 640;
      document.getElementById('frame').height = h;
      document.getElementById('frame').srcdoc = templates[type]();
    }

    // Init
    document.getElementById('frame').srcdoc = templates.signup();
  </script>
</body>
</html>
